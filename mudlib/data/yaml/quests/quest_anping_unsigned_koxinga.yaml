id: quest_anping_unsigned_koxinga
title: "老街的小廟神明"
settlement: tainan
scope:
  - tainan
era: qing
difficulty: 3
description: |
  安平老街尾端的小廟供奉著一位沒有寫明來歷的『延平王』。
  蝦餅店老闆娘阿鳳暗示，這個廟可能與鄭成功後裔在清初的避難歷史有關。
  你決定前往小廟進行深度歷史考證。
objectives:
  - id: talk_prawn_lady
    description: "向 老闆娘阿鳳 詢問小廟的來歷"
    npc: NPC_anping_prawn_cracker_lady
    ask_topic: 榕樹屋
  - id: look_old_street
    description: "在 安平老街 尋找小廟的碑文或刻字"
    site: tainan_anping
    action: look
  - id: get_anping_memory
    description: "解鎖記憶碎片『大員港的荷蘭船隊』"
    memory: tainan_anping_zerozeroone
completion_reward:
  exp: 1100
  faction: taiwan_cultural_memory
  reputation: 75
