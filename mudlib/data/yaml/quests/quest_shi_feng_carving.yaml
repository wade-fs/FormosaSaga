id: quest_shi_feng_carving
title: "十宜樓的狂草小刀字"
settlement: lukang
scope:
  - lukang
era: qing
difficulty: 3
description: |
  文史研究員林先生提到十宜樓的木櫺上，有一處被油漆蓋住的狂草小刀刻字。
  這是清代舉人林會堂在割台噩耗傳來時留下的絕筆。
  你決定去十宜樓實地考察，將這段悲憤的文人記憶還原出來。
objectives:
  - id: talk_scholar_poem
    description: "向 研究員林先生 詢問舉人林會堂的名字與刻字位置"
    npc: NPC_lukang_scholar_elder
    ask_topic: 小刀刻字
  - id: search_shi_feng
    description: "在 十宜樓 仔細尋找木欄杆上的刀刻痕跡"
    site: lukang_shi_feng
    action: search
  - id: get_shifeng_memory
    description: "解鎖記憶碎片『十宜樓的狂草斷章』"
    memory: lukang_shi_feng_zerozeroone
completion_reward:
  exp: 1100
  faction: taiwan_cultural_memory
  reputation: 75
