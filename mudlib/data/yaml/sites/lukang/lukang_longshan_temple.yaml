base_description: |
  格局宏偉且古樸典雅的龍山寺，山門與戲台的藻井展現出精湛的閩南傳統建築藝術。
  幽靜的庭院中，偶爾傳來幾聲鐘磬與誦經聲，帶來無比的心靈寧靜。
travel_arrive_text: "你來到了鹿港龍山寺，古樸莊嚴的殿宇與沉靜的氛圍帶走了一切喧囂。"

