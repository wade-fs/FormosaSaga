description: |
  香藝師傅阿福說，「西拉雅香」的配方有一半他知道，
  另一半他懷疑在後花園的地下。
  西拉雅後裔阿春嬤說，那種香是祭典用的，召喚祖靈用的。
  你試圖找齊完整的配方，並決定它的用途。
