id: quest_yongle_old_cloth_secret
title: "此布留予來者認"
settlement: tainan
scope:
  - tainan
era: postwar
difficulty: 3
description: |
  永樂市場的老布商阿順仔珍藏著一疋清代留下來的靛藍色老布頭。
  布的褶縫裡塞著一張寫著『此布留予來者認』的紙片。
  你需要解開這個長達百年的遺留之謎。
objectives:
  - id: talk_cloth_merchant
    description: "向 布商阿順仔 詢問老布頭的來歷"
    npc: NPC_old_tailor_tainan
    ask_topic: 老布頭
  - id: search_market
    description: "在 永樂市場 尋找有關該訂單的舊記錄"
    site: tainan_yongle_market
    action: search
  - id: get_cloth_memory
    description: "解鎖記憶碎片『永樂市場布市的算盤聲』"
    memory: tainan_postwar_002
completion_reward:
  exp: 1200
  faction: taiwan_folk_memory
  reputation: 80
