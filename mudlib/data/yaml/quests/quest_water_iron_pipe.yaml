    description: "向 老工程師 詢問明治舊管線的情形"
    npc: NPC_water_engineer
    ask_topic: 老管道
  - id: look_pump
    description: "在 台南水道 觀察運轉的百年水泵"
    site: tainan_water_facility_old
    action: look
  - id: get_water_memory
    description: "解鎖記憶碎片『山上淨水場的第一滴水』"
    memory: tainan_japanese_zerozerotwo
completion_reward:
