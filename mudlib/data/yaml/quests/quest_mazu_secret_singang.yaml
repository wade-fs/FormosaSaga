description: |
  廟婆阿鳳說，廟裡有一塊刻著非中文非日文字的石碑，是廟的秘密。
  文史工作者阿明說，他看了幾分鐘，只認出幾個字，研究了三年。
  你想看到那塊石碑，並嘗試讀出它上面的內容。
