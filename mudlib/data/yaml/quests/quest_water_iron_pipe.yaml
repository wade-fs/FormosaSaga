description: |
  台南水道的一截明治時期舊鑄鐵管道至今仍在使用，運作極其穩定。
  老工程師對此充滿敬意，但似乎有一台老水泵被封鎖在庫房角落。
  你將協助他重新了解台南淨水場的百年記憶。
objectives:
