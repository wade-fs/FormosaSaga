id: dashiye_temple
settlement: minxiong
canonical_name: 大士爺廟
is_heritage: false
base_description: |
  古老的廟宇石柱上雕刻著斑駁的神話神獸，香火的煙霧裊裊上升。
  信眾們在神前虔誠地投擲筊杯，祈求平安與豐收。
travel_arrive_text: "你走進大士爺廟的廟埕，空氣中瀰漫著濃郁的檀香與紙錢的微香。"

names:
  - era: qing
    name: 打貓大士爺廟
  - era: japanese
    name: 大士爺廟
  - era: modern
    name: 大士爺廟

connections:
  - minxiong_old_station
  - minxiong_market
  - waterway

reveal_layers:
  - condition: all
    checks:
      - type: has_quest
        quest_id: temple_exorcism
        status: active
      - type: in_party
    text: "$HIY$【陣營秘境線索】你與隊友們互換了個眼神，發現供桌下方的石磚有些鬆動，隱約透出一股來自地底的陰冷氣息...\n這似乎就是廟委提到的「地下鎮煞陣法」入口。$NOR$"
