id: quest_incense_pastry_secret
title: "避邪神香與鳳眼木模"
settlement: lukang
scope:
  - lukang
era: modern
difficulty: 2
description: |
  香藝阿義師傅表示，大天后宮木盒裡保存著清代瘟疫時期的『避邪神香』配方，但缺少關鍵植物。
  餅鋪阿修也擁有一只大正時期為皇室準備的鳳眼木模。
  你將協助他們將這些精緻的手工民俗記憶拼湊完整。
objectives:
  - id: talk_incense_recipe
    description: "向 香藝師傅阿義 詢問避邪神香的配方秘密"
    npc: NPC_lukang_incense_master
    ask_topic: 避邪神香
  - id: talk_pastry_mold
    description: "向 餅鋪繼承人阿修 詢問鳳眼木模的歷史與皇太子的故事"
    npc: NPC_lukang_pastry_boss
    ask_topic: 鳳眼木模
  - id: search_tianhou_box
    description: "在 天后宮 尋找保存舊配方的舊木盒"
    site: lukang_tianhou_temple
    action: search
  - id: get_pastry_memory
    description: "解鎖記憶碎片『鳳眼糕的日本皇室貢禮』"
    memory: lukang_pastry_001
completion_reward:
  exp: 1050
  faction: taiwan_folk_memory
  reputation: 70
