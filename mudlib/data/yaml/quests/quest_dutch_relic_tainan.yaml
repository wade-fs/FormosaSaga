description: |
  學者Jan一直在尋找荷蘭國家檔案館殘缺的熱蘭遮城地下室圖紙。
  阿義志工透露，安平古堡老磚牆的厚度似乎藏有端倪。
  你將解開這個大航海時代的空間秘密。
