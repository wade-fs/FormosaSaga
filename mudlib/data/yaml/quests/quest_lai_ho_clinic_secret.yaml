id: quest_lai_ho_clinic_secret
title: "媽祖醫生的處方箋"
settlement: changhua_city
scope:
  - changhua_city
era: japanese
difficulty: 3
description: |
  賴和紀念館小敏展示了一張他在大正年間開立的感冒處方箋。
  處方箋背面用鉛筆寫著文學手稿的草稿，但有些字被摺痕磨損。
  你將在老城區尋訪曾受他恩惠的老人，拼湊完整的手稿內容。
objectives:
  - id: talk_curator_script
    description: "在 賴和紀念館 向 小敏 詢問處方箋草稿的摺痕缺字"
    npc: NPC_lai_ho_curator
    ask_topic: 處方箋
  - id: talk_nanyao_secret
    description: "在 南瑤宮 向 老乩童阿喜叔 詢問賴和與匠師的往來"
    npc: NPC_changhua_nanyao_keeper
    ask_topic: 歷史
  - id: look_clinic_manuscript
    description: "在 賴和醫院舊址 仔細翻閱賴和的新文學手稿"
    site: changhua_lai_ho_clinic
    action: look
  - id: get_laiho_memory
    description: "解鎖記憶碎片『撕毀欠條的除夕夜』"
    memory: changhua_laiho_001
completion_reward:
  exp: 1300
  faction: taiwan_cultural_memory
  reputation: 90
