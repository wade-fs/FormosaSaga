id: quest_siraya_urn_secret
title: "神龕旁的紅陶甕"
settlement: tainan
scope:
  - tainan
era: modern
difficulty: 2
description: |
  新市仔社遺址的土地公廟裡，神像旁放著一個插著澤蘭的紅陶甕。
  考古系學生小明對此進行了初步田野調查。
  你將協助他釐清西拉雅族阿立祖信仰是如何在漢人神殿中生存下來的。
objectives:
  - id: talk_student
    description: "向 學生小明 詢問他發現的神龕細節"
    npc: NPC_tainan_archaeology_student
    ask_topic: 阿立祖
  - id: look_urn
    description: "在 西拉雅遺址 觀察神龕旁的配置"
    site: tainan_xilaya
    action: look
  - id: get_urn_memory
    description: "解鎖記憶碎片『土地公廟的阿立祖』"
    memory: tainan_siraya_urn_001
completion_reward:
  exp: 1000
  faction: siraya_memory
  reputation: 70
