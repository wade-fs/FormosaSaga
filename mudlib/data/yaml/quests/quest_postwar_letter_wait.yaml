id: quest_postwar_letter_wait
title: "看守所寄出的信"
settlement: tainan
scope:
  - tainan
era: postwar
difficulty: 3
description: |
  二二八紀念館展示著一封手寫遺書，收件人是『春梅』，但寄送地址早已變更。
  館員阿敏對此信件的背景感到無奈。
  你將重走這個地址，為這段長達數十年的沉默帶回一絲溫暖的解讀。
objectives:
  - id: talk_staff
    description: "向 館員阿敏 詢問信件的來源與細節"
    npc: NPC_two_two_eight_museum_staff
    ask_topic: 信件
  - id: look_memorial
    description: "在 紀念館 仔細閱讀該信件原文"
    site: tainan_two_two_eight_memorial
    action: look
  - id: talk_elder_witness
    description: "向 東門城邊老攤販阿德仔 詢問當年台南大捕殺的見聞"
    npc: NPC_dongmen_gate_elder
    ask_topic: 東門城
  - id: get_postwar_memory
    description: "解鎖記憶碎片『二二八的最後家書』"
    memory: tainan_postwar_zerozeroone
completion_reward:
  exp: 1600
  faction: taiwan_historical_truth
  reputation: 110
