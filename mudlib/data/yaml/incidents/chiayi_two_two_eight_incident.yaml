incident_id: chiayi_two_two_eight_incident
name: 嘉義二二八：機場攻防與藝術家之死
description: |
  民國三十六年（1947）三月，嘉義爆發激烈的二二八事件，市民義勇軍包圍水上機場，試圖奪取武器。
  陳澄波與三名仕紳代表赴水上機場談判，遭逮捕後被押至嘉義火車站前槍決示眾。
  你試圖透過殘存的記憶碎片、目擊者口述、文物，還原這段歷史的輪廓。
truth: |
  嘉義二二八的特殊性在於，市民以相對有組織的方式進行武裝抵抗，並試圖透過談判解決。陳澄波的死不是意外，是刻意的示眾行為，目的是恐嚇和瓦解抵抗意志。事件後，嘉義的文化界沉默了近四十年。
