id: quest_five_concubines_flower
title: "五妃廟的無名花"
settlement: tainan
scope:
  - tainan
era: koxinga
difficulty: 2
description: |
  五妃廟神龕前每年特定日子都會出現一束無名花。
  廟公阿文不知道是誰放的，但這與寧靖王姬妾殉節的歷史記憶深深交織。
  你需要找到這個默默致敬的人。
objectives:
  - id: talk_keeper
    description: "向 廟公阿文 詢問無名花的日期"
    npc: NPC_five_concubines_keeper
    ask_topic: 花
  - id: look_urn
    description: "在 五妃廟 仔細尋找祭祀的痕跡"
    site: five_concubines_temple
    action: look
  - id: talk_novelist
    description: "向 小說家彥廷 詢問他對五妃歷史的研究"
    npc: NPC_historical_novelist
    ask_topic: 五妃
  - id: get_concubines_memory
    description: "解鎖記憶碎片『寧靖王姬妾殉節』"
    memory: tainan_koxinga_zerozerothree
completion_reward:
  exp: 1000
  faction: taiwan_cultural_memory
  reputation: 70
