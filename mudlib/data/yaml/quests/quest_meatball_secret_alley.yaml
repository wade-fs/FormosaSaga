id: quest_meatball_secret_alley
title: "肉圓攤旁的秘密聯絡點"
settlement: changhua_city
scope:
  - changhua_city
era: japanese
difficulty: 2
description: |
  肉圓店老闆阿成說，他祖父在日治初期擺攤時，
  老街屋的肉圓店曾被抗日義軍用作秘密聯絡點，並在竹籤筒裡傳遞傷藥與字條。
  你決定去老巷子深處進行深度探尋，還原這段街市底層的抗日互助故事。
objectives:
  - id: talk_meatball_secret
    description: "向 老闆阿成 詢問竹籤筒與老屋聯絡點的口述歷史"
    npc: NPC_changhua_meatball_owner
    ask_topic: 傳言
  - id: look_meatball_alley
    description: "在 肉圓老巷 仔細尋找舊店鋪後方的老隔間與通道"
    site: changhua_meatball_alley
    action: look
  - id: talk_west_gate_elder
    description: "向 西門古厝阿吉伯 詢問當年的械鬥後巷防禦"
    npc: NPC_changhua_west_gate_elder
    ask_topic: 械鬥
  - id: get_meatball_memory
    description: "解鎖記憶碎片『孔廟前的扁擔肉圓』"
    memory: changhua_meatball_zerozeroone
completion_reward:
  exp: 1050
  faction: taiwan_folk_memory
  reputation: 70
